# DiffusionDrive agent configuration for Bench2Drive dataset
_target_: navsim.agents.diffusiondrive.transfuser_agent.TransfuserAgent

checkpoint_path: null

config:
  _target_: navsim.agents.diffusiondrive.transfuser_config.TransfuserConfig
  _convert_: all
  
  # Model architecture
  backbone: "resnet34"
  n_views: 3  # Using 3 front cameras from Bench2Drive
  
  # Image processing
  img_vert_anchors: 5
  img_horz_anchors: 5
  img_anchors: 25
  lidar_vert_anchors: 5
  lidar_horz_anchors: 5
  lidar_anchors: 25
  
  # BEV parameters (matching CARLA coordinate system)
  pixels_per_meter: 4.0
  
  # Agent detection
  n_det_classes: 1
  max_agents_distance: 30.0
  
  # Driving commands
  num_driving_commands: 4  # 0=LEFT, 1=STRAIGHT, 2=RIGHT, 3=UNKNOWN
  
  # Training parameters
  lr: 0.0003
  weight_decay: 0.01
  clf_loss_weight: 1.0
  reg_loss_weight: 10.0
  traj_loss_weight: 0.1
  use_controller_input_prediction: true
  
  # Detection parameters
  bb_confidence_threshold: 0.5
  
  # Trajectory parameters
  n_modes: 20
  num_timesteps: 8  # 4 seconds at 0.5s intervals
  planner_ndim: 2
  
  # Diffusion parameters
  variance_schedule: "scaled_linear"
  n_diffusion_steps: 50
  dim_mults: [1, 2, 4]
  
  # Transformer parameters
  tf_d_model: 128
  tf_num_queries: 20
  tf_nheads: 8
  tf_dropout: 0.1
  tf_enc_layers: 3
  tf_dec_layers: 3
  
  # Feature dimensions
  image_encoder_feature_dim: 64
  lidar_encoder_feature_dim: 128
  
  # Paths (to be set)
  bkb_path: null  # Path to pretrained ResNet-34
  plan_anchor_path: null  # Path to trajectory anchors

# Use Bench2Drive feature and target builders
feature_builders:
  - _target_: navsim.agents.diffusiondrive.transfuser_features_b2d.Bench2DriveFeatureBuilder
    config: ${config}

target_builders:
  - _target_: navsim.agents.diffusiondrive.transfuser_features_b2d.Bench2DriveTargetBuilder
    config: ${config}