# Bench2Drive dataset configuration

# Dataset type identifier for cache-only training
dataset_type: bench2drive

# NOTE: This configuration is used for cache-only training.
# Scenario splits are determined by bench2drive_base_train_val_split.json
# when use_cache_without_dataset=True

# Scene filter for compatibility with NAVSIM structure
scene_filter:
  _target_: navsim.common.dataclasses.SceneFilter
  _convert_: all
  log_names: null # Use all available scenarios
  tokens: null
  num_frames: 30 # 15 seconds at 2Hz
  num_history_frames: 4
  num_future_frames: 26
  frame_interval: 1 # Already downsampled in loader
  has_route: true
  max_scenes: null

# Bench2Drive specific settings (minimal config for cache-only training)
bench2drive:
  _target_: navsim.common.bench2drive_dataloader.Bench2DriveConfig
  # data_root is not needed for cache-only training
  sampling_rate: 5 # Downsample from 10Hz to 2Hz
  num_frames: ${scene_filter.num_frames}
  num_history_frames: ${scene_filter.num_history_frames}
  num_future_frames: ${scene_filter.num_future_frames}
  extract_tar: false # Not needed for cache-only training
