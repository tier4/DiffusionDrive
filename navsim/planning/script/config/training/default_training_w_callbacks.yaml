hydra:
  run:
    dir: ${output_dir}
  output_subdir: ${output_dir}/code/hydra           # Store hydra's config breakdown here for debugging
  searchpath:                                       # Only <exp_dir> in these paths are discoverable
    - pkg://navsim.planning.script.config.common
  job:
    chdir: False

defaults:
  - default_common
  - default_evaluation
  - default_train_val_test_log_split
  - agent: ego_status_mlp_agent
  - _self_

split: trainval
cache_path: ${oc.env:NAVSIM_EXP_ROOT}/training_cache
use_cache_without_dataset: false # load the training samples from the cache. scene-filter will be ignored
force_cache_computation: true
seed: 0

dataloader:
  params:
    batch_size: 64  # number of samples per batch
    num_workers: 4  # number of workers for data loading
    pin_memory: true  # pin memory for faster GPU transfer
    prefetch_factor: 2  # number of samples loaded in advance by each worker

trainer:
  params:
    max_epochs: 100  # maximum number of training epochs
    check_val_every_n_epoch: 1  # run validation set every n training epochs
    val_check_interval: 1.0  # [%] run validation set every X% of training set

    limit_train_batches: 1.0  # how much of training dataset to check (float = fraction, int = num_batches)
    limit_val_batches: 1.0  # how much of validation dataset to check (float = fraction, int = num_batches)

    accelerator: gpu  # distribution method
    strategy: ddp
    precision: 16-mixed  # floating point precision
    num_nodes: 1  # Number of nodes used for training

    num_sanity_val_steps: 0  # number of validation steps to run before training begins
    fast_dev_run: false  # runs 1 batch of train/val/test for sanity

    accumulate_grad_batches: 1  # accumulates gradients every n batches
    # track_grad_norm: -1  # logs the p-norm for inspection
    gradient_clip_val: 0.0  # value to clip gradients
    gradient_clip_algorithm: norm  # [value, norm] method to clip gradients
    default_root_dir: ${output_dir}

  callbacks:
    # Time logging callback for tracking training/validation time
    - _target_: navsim.planning.training.callbacks.time_logging_callback.TimeLoggingCallback

    # Model checkpointing callback - saves best models based on validation trajectory loss
    - _target_: pytorch_lightning.callbacks.ModelCheckpoint
      dirpath: null  # Will use default from trainer
      filename: "epoch={epoch:03d}-val_traj_loss={val/trajectory_loss_epoch:.4f}"  # Include loss value in filename
      every_n_epochs: 10
      save_top_k: 5
      save_last: True  # Also save the last checkpoint
      monitor: "val/trajectory_loss_epoch"  # Monitor trajectory loss specifically
      mode: "min"  # Minimize trajectory loss
      verbose: True  # Print when saving checkpoints
      auto_insert_metric_name: False  # We're manually controlling the filename format

    # Early stopping callback - stops training when validation trajectory loss stops improving
    # This is optional but helps prevent overfitting and saves compute resources
    - _target_: pytorch_lightning.callbacks.EarlyStopping
      monitor: "val/trajectory_loss_epoch"  # Same metric as checkpoint monitoring
      min_delta: 0.0001  # Minimum change to qualify as an improvement
      patience: 50  # Number of validation epochs with no improvement after which training will be stopped
      mode: "min"  # Minimize trajectory loss
      verbose: True  # Print early stopping messages
      check_finite: True  # Stop training if the monitored metric becomes NaN or inf
      stopping_threshold: null  # No specific threshold, just use patience
      divergence_threshold: null  # No divergence threshold